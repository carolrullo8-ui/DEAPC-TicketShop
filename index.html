<!DOCTYPE html>
<!-- Declara que é HTML5 -->
<html lang="pt">
<!-- lang="pt" indica que o idioma é português -->

<head>
    <meta charset="UTF-8">
    <!-- Permite acentos e caracteres portugueses -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Essencial para responsividade mobile -->

    <title>MarketingAuto — Login</title>
    <!-- Texto que aparece no separador do browser -->

    <link rel="stylesheet" href="styles/style.css">
    <!-- Liga o ficheiro CSS a esta página -->
</head>

<body class="pagina-login">
<!-- class="pagina-login" aplica fundo especial só nesta página -->

    <!-- CABEÇALHO SIMPLES — só o logo -->
    <header class="header-login">
    <!-- Header mais simples que nas outras páginas — sem menu -->

        <div class="logo">
            🎯 <span>MarketingAuto</span>
            <!-- 🎯 é o emoji de alvo — representa marketing direcionado -->
        </div>

    </header>

    <!-- ÁREA CENTRAL DE LOGIN -->
    <main class="main-login">
    <!-- Centra o formulário vertical e horizontalmente -->

        <div class="caixa-login">
        <!-- Caixa branca com sombra que contém o formulário -->

            <div class="login-titulo">
                <h1>🎯 MarketingAuto</h1>
                <!-- Título principal — só deve existir um h1 por página -->

                <p>Plataforma de Automatização de Marketing</p>
                <!-- Subtítulo descritivo -->
            </div>

            <!-- FORMULÁRIO DE LOGIN -->
            <div class="form-login">
            <!-- 
                Usamos div em vez de form por agora
                O form será implementado no W2 com PHP
            -->

                <div class="form-grupo">
                <!-- Agrupa o label e o input para o CSS os alinhar -->

                    <label for="username">Username</label>
                    <!-- for="username" liga ao input com id="username" -->

                    <input type="text" 
                           id="username" 
                           name="username"
                           placeholder="Ex: gestor.marketing"
                           required>
                    <!-- 
                        type="text" aceita qualquer texto
                        required torna o campo obrigatório
                        placeholder dá uma dica ao utilizador
                    -->
                </div>

                <div class="form-grupo">
                    <label for="password">Password</label>

                    <input type="password" 
                           id="password" 
                           name="password"
                           placeholder="A tua password"
                           required>
                    <!-- 
                        type="password" esconde o texto escrito
                        Aparece como pontos ou asteriscos
                    -->
                </div>

                <button class="btn-primario btn-login" 
                        onclick="window.location.href='dashboard.html'">
                    Entrar →
                </button>
                <!-- 
                    onclick="..." redireciona para o dashboard ao clicar
                    No W2 isto será substituído por um formulário PHP real
                -->

                <p class="login-nota">
                    Acesso restrito a utilizadores autorizados.
                </p>
                <!-- Nota informativa abaixo do botão -->

            </div>
            <!-- fim do form-login -->

        </div>
        <!-- fim da caixa-login -->

    </main>

    <!-- RODAPÉ -->
    <footer class="footer-login">
        <p>© 2025 MarketingAuto</p>
    </footer>

    <script src="scripts/main.js"></script>
    <!-- 
        Liga o JavaScript — fica no fim do body
        para o HTML carregar antes do script correr
    -->

</body>
</html>
